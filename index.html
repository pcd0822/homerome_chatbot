<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/ai-icon.png" />

    <!-- 소셜 공유 썸네일(OG). 이미지는 public/og_image/og.png 에 넣으세요.
         카카오/페북 등 일부 크롤러는 절대 URL 을 요구하므로, 배포 도메인이 있으면
         아래 두 og:image / twitter:image 를 전체 URL(https://내도메인/og_image/og.png)로 바꾸세요. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="탐구 챗봇" />
    <meta property="og:description" content="학생용 멀티 LLM 탐구 챗봇" />
    <meta property="og:image" content="/og_image/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="탐구 챗봇" />
    <meta name="twitter:description" content="학생용 멀티 LLM 탐구 챗봇" />
    <meta name="twitter:image" content="/og_image/og.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css"
    />
  </head>
